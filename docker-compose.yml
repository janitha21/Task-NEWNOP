version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: task_manager_db
    environment:
      MYSQL_ROOT_PASSWORD: 1234@Janith
      MYSQL_DATABASE: task_manager
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: task_manager_backend
    ports:
      - "8080:8080"
    environment:
      # Override the DB_URL to point to the 'mysql' container instead of localhost
      DB_URL: jdbc:mysql://mysql:3306/task_manager?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: 1234@Janith
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
